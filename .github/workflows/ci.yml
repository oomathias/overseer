name: ci

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup mise
        uses: jdx/mise-action@v4.0.1
        with:
          cache: true
          version: 2026.4.5

      - name: Install tools
        run: mise install

      - name: Format check
        run: mise run fmt-check

      - name: Test
        run: mise run test

      - name: Build release
        run: mise run build-release

      - name: Release config check
        run: mise run release-check
