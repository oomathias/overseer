# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: overseer

release:
  replace_existing_artifacts: true

before:
  hooks:
    - rm -rf .goreleaser-artifacts
    - mkdir -p .goreleaser-artifacts/source .goreleaser-artifacts/binaries/darwin_arm64 .goreleaser-artifacts/binaries/darwin_amd64
    - cp -R App Tests Package.swift .goreleaser-artifacts/source/
    - "python3 -c 'from pathlib import Path; Path(\".goreleaser-artifacts/source/App/Core/Version.swift\").write_text(\"import Foundation\\n\\nlet appVersion = \\\"{{ .Version }}\\\"\\n\")'"
    - swift build -c release --arch arm64 --package-path .goreleaser-artifacts/source
    - cp .goreleaser-artifacts/source/.build/arm64-apple-macosx/release/overseer .goreleaser-artifacts/binaries/darwin_arm64/overseer
    - swift build -c release --arch x86_64 --package-path .goreleaser-artifacts/source
    - cp .goreleaser-artifacts/source/.build/x86_64-apple-macosx/release/overseer .goreleaser-artifacts/binaries/darwin_amd64/overseer

builds:
  - id: overseer
    main: .
    dir: ./.release
    binary: overseer
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    hooks:
      post:
        - cp .goreleaser-artifacts/binaries/darwin_{{ .Arch }}/overseer {{ .Path }}

archives:
  - id: overseer
    ids:
      - overseer
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz

checksum:
  name_template: checksums.txt

notarize:
  macos:
    - enabled: '{{ isEnvSet "MACOS_SIGN_P12" }}'
      ids:
        - overseer
      sign:
        certificate: "{{ .Env.MACOS_SIGN_P12 }}"
        password: "{{ .Env.MACOS_SIGN_PASSWORD }}"
      notarize:
        issuer_id: "{{ .Env.MACOS_NOTARY_ISSUER_ID }}"
        key_id: "{{ .Env.MACOS_NOTARY_KEY_ID }}"
        key: "{{ .Env.MACOS_NOTARY_KEY }}"

signs:
  - id: checksum
    cmd: cosign
    artifacts: checksum
    signature: "${artifact}.sigstore.json"
    args:
      - sign-blob
      - "--yes"
      - "--bundle=${signature}"
      - "${artifact}"

source:
  enabled: false

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
